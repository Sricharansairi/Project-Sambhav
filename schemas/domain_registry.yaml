        required: false
        options:
          - { label: "Vague — someday",      value: 0 }
          - { label: "General — this month", value: 1 }
          - { label: "This week",            value: 2 }
          - { label: "Exact date / time",    value: 3 }

  # ── DOMAIN 10: PRAGMA (Forensic Psychological Profiling) ─────
  pragma:
    display_name: "PRAGMA"
    emoji_icon: "🔬"
    model_path: "models/pragma_v17_xgb.joblib"
    brier_score: 0.0179
    auc: 0.9960
    accuracy: 0.975
    status: PUBLICATION_GRADE
    model_available: true
    blend_mode: false
    retrain_locked: true  # NEVER RETRAIN
    supported_outcomes: ["genuine", "deceptive"]
    question_template: "Analyse this communication for psychological markers and deception."
    disclaimer: "PRAGMA is a research-grade forensic psychological profiling tool. Outputs are probabilistic, not definitive verdicts."
    parameters:
      - key: communication_text
        label: "Paste the communication to analyse"
        description: "Statement, email, message, or verbal transcript"
        type: textarea
        required: true
        placeholder: "Paste the full communication here for forensic analysis..."

      - key: context_type
        label: "What is the context of this communication?"
        type: chips
        required: true
        options:
          - { label: "Personal / social",     value: 0 }
          - { label: "Professional / work",   value: 1 }
          - { label: "Legal / formal",        value: 2 }
          - { label: "Negotiation",           value: 3 }
          - { label: "Crisis / high-stakes",  value: 4 }

      - key: stakes_level
        label: "What are the stakes of this communication?"
        type: chips
        required: true
        options:
          - { label: "Low — casual",          value: 0 }
          - { label: "Medium — important",    value: 1 }
          - { label: "High — significant",    value: 2 }
          - { label: "Critical — very high",  value: 3 }

      - key: speaker_role
        label: "What is the speaker's role?"
        type: chips
        required: false
        options:
          - { label: "Individual / private",  value: 0 }
          - { label: "Employee / staff",      value: 1 }
          - { label: "Manager / executive",   value: 2 }
          - { label: "Public figure",         value: 3 }
          - { label: "Organisation",          value: 4 }

      - key: baseline_available
        label: "Do you have a baseline of their normal communication style?"
        type: chips
        required: false
        options:
          - { label: "No baseline",              value: 0 }
          - { label: "Yes — some examples",      value: 1 }
          - { label: "Yes — extensive baseline", value: 2 }

  # ── DOMAIN 11: Sarvagna (Life Decision Model) ───────────────
  sarvagna:
    display_name: "Sarvagna"
    emoji_icon: "🌐"
    model_path: "models/sarvagna_wordsvd.joblib"
    model_path_char: "models/sarvagna_charsvd.joblib"
    model_path_brain: "models/sarvagna_brain.joblib"
    model_path_classifier: "models/sarvagna_classifier.joblib"
    # Architecture: WordSVD 600d + CharSVD 200d + Brain 20d = 820 features
    feature_dims:
      word_svd: 600
      char_svd: 200
      brain: 20
      total: 820
    brier_score: null      # Model pending download — see Phase 2
    auc: null
    accuracy: null
    status: PENDING_DOWNLOAD
    model_available: false  # SET TO TRUE after downloading
    blend_mode: false
    supported_outcomes: ["verified", "unverified", "uncertain"]
    question_template: "Analyse this life decision context for multi-dimensional insights."
    parameters:
      - key: text_input
        label: "Paste the text for Sarvagna to analyse"
        description: "News article, statement, social media post, etc."
        type: textarea
        required: true
        placeholder: "Paste full text here for deep NLP analysis..."

      - key: domain_context
        label: "What domain does this text belong to?"
        type: chips
        required: true
        options:
          - { label: "News / journalism",   value: 0 }
          - { label: "Social media",        value: 1 }
          - { label: "Academic / research", value: 2 }
          - { label: "Legal / official",    value: 3 }
          - { label: "Medical / health",    value: 4 }
          - { label: "General",             value: 5 }

      - key: verification_depth
        label: "Analysis depth required?"
        type: chips
        required: false
        options:
          - { label: "Quick — surface scan",  value: 0 }
          - { label: "Standard analysis",      value: 1 }
          - { label: "Deep investigation",     value: 2 }

# ── Global Settings ──────────────────────────────────────────
settings:
  default_mode: guided
  probability_cap: 0.97         # Never show > 97%
  critical_gap_threshold: 0.40  # Block if ML–LLM gap > 40%
  high_gap_threshold: 0.25
  moderate_gap_threshold: 0.10
  monte_carlo_runs: 200
  shap_background_samples: 50
  reliability_index_weights:
    parameter_completeness: 0.40
    layer_availability: 0.30
    ml_llm_agreement: 0.20
    vision_bonus: 0.10
  api_base_url: "http://localhost:8000"   # Override in .env: SAMBHAV_API_URL