# ============================================================
# Project Sambhav — Domain Registry v2.1
# ALL 11 DOMAINS — Updated April 2026
# ============================================================
# Blend strategy: behavioural + claim use real + synthetic blend
# Sarvagna: TF-IDF/SVD pipeline, different architecture
# Trophy models: pragma, loan, mental_health — NEVER RETRAIN
# ============================================================

domains:

  # ── DOMAIN 1: Student Performance ───────────────────────────
  student:
    display_name: "Student Performance"
    emoji_icon: "📚"
    model_path: "models/student_v14_xgb.joblib"
    brier_score: 0.0639
    auc: 0.8753
    accuracy: 0.842
    status: TROPHY
    model_available: true
    blend_mode: false
    supported_outcomes: ["pass", "fail"]
    question_template: "Will this student pass their exams?"
    parameters:
      - key: study_hours
        label: "How many hours does the student study per day?"
        description: "Average daily study time"
        type: chips
        required: true
        options:
          - { label: "0 – 1 hr",   value: 0.5 }
          - { label: "1 – 2 hrs",  value: 1.5 }
          - { label: "2 – 4 hrs",  value: 3.0 }
          - { label: "4 – 6 hrs",  value: 5.0 }
          - { label: "6 – 9 hrs",  value: 7.5 }
          - { label: "9+ hrs",     value: 10.0 }

      - key: sleep_hours
        label: "How many hours does the student sleep per night?"
        description: "Average nightly sleep duration"
        type: chips
        required: true
        options:
          - { label: "< 4 hrs",   value: 3.0 }
          - { label: "4 – 5 hrs", value: 4.5 }
          - { label: "5 – 6 hrs", value: 5.5 }
          - { label: "6 – 7 hrs", value: 6.5 }
          - { label: "7 – 8 hrs", value: 7.5 }
          - { label: "8 – 9 hrs", value: 8.5 }
          - { label: "9+ hrs",    value: 9.5 }

      - key: attendance_pct
        label: "What is the student's attendance percentage?"
        description: "Classes attended out of total classes"
        type: number
        min: 0
        max: 100
        default: 75
        required: true

      - key: stress_level
        label: "What is the student's current stress level?"
        description: "Self-reported or observed stress"
        type: chips
        required: true
        options:
          - { label: "Low",     value: 0 }
          - { label: "Medium",  value: 1 }
          - { label: "High",    value: 2 }
          - { label: "Extreme", value: 3 }

      - key: past_score
        label: "What was the student's last exam score? (0–100)"
        description: "Most recent examination result"
        type: number
        min: 0
        max: 100
        default: 60
        required: true

      - key: motivation
        label: "How motivated is the student? (1 = very low, 5 = very high)"
        description: "Intrinsic motivation level"
        type: chips
        required: false
        options:
          - { label: "1 – Very Low", value: 1 }
          - { label: "2 – Low",      value: 2 }
          - { label: "3 – Medium",   value: 3 }
          - { label: "4 – High",     value: 4 }
          - { label: "5 – Very High",value: 5 }

      - key: preparation_days
        label: "How many days before the exam did they start preparing?"
        description: "Lead time for exam preparation"
        type: chips
        required: false
        options:
          - { label: "0 – 2 days",  value: 1 }
          - { label: "3 – 7 days",  value: 5 }
          - { label: "8 – 14 days", value: 11 }
          - { label: "15+ days",    value: 20 }

      - key: project_complexity
        label: "What is the project's complexity level?"
        description: "How difficult or multifaceted is the current project?"
        type: chips
        required: false
        options:
          - { label: "Low",    value: 1 }
          - { label: "Medium", value: 2 }
          - { label: "High",   value: 3 }

      - key: project_progress
        label: "What is the current project progress (%)?"
        description: "Completion status of the project"
        type: number
        min: 0
        max: 100
        default: 0
        required: false

  # ── DOMAIN 2: High School Outcomes ──────────────────────────
  high_school:
    display_name: "High School"
    emoji_icon: "🎓"
    model_path: "models/higher_ed_v14_xgb.joblib"
    brier_score: 0.0879
    auc: 0.9387
    accuracy: 0.856
    status: GOOD
    model_available: true
    blend_mode: false
    supported_outcomes: ["graduate", "dropout"]
    question_template: "Will this student graduate or drop out?"
    parameters:
      - key: enrollment_age
        label: "What was the student's age at enrollment?"
        type: chips
        required: true
        options:
          - { label: "17 – 19", value: 18 }
          - { label: "20 – 23", value: 21 }
          - { label: "24 – 27", value: 25 }
          - { label: "28 – 35", value: 31 }
          - { label: "36+",     value: 40 }

      - key: prev_qualification_grade
        label: "Previous qualification grade (0–200 scale)?"
        type: number
        min: 0
        max: 200
        default: 130
        required: true

      - key: scholarship
        label: "Is the student a scholarship holder?"
        type: chips
        required: true
        options:
          - { label: "Yes", value: 1 }
          - { label: "No",  value: 0 }

      - key: tuition_up_to_date
        label: "Are tuition fees up to date?"
        type: chips
        required: true
        options:
          - { label: "Yes — fully paid", value: 1 }
          - { label: "No — in arrears",  value: 0 }

      - key: curricular_units_approved
        label: "How many curricular units approved in 1st semester?"
        type: chips
        required: true
        options:
          - { label: "0",      value: 0 }
          - { label: "1 – 3",  value: 2 }
          - { label: "4 – 6",  value: 5 }
          - { label: "7 – 9",  value: 8 }
          - { label: "10+",    value: 11 }

      - key: displaced
        label: "Is the student a displaced person?"
        type: chips
        required: false
        options:
          - { label: "Yes", value: 1 }
          - { label: "No",  value: 0 }

