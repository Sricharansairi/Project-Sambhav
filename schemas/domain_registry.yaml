      - key: workplace_culture
        label: "How would they rate their workplace culture or environment?"
        type: chips
        required: true
        options:
          - { label: "Toxic",     value: 0 }
          - { label: "Neutral",   value: 1 }
          - { label: "Positive",  value: 2 }
          - { label: "Excellent", value: 3 }

      - key: future_visibility
        label: "How clear is their vision for their professional future here?"
        type: chips
        required: false
        options:
          - { label: "1 – Completely Unclear",  value: 1 }
          - { label: "2 – Vague",               value: 2 }
          - { label: "3 – Somewhat clear",      value: 3 }
          - { label: "4 – Clear",               value: 4 }
